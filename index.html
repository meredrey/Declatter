<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clear Home</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
:root {
  --rose:#C8A4A4; --rose-l:#E8D5D5; --rose-p:#F7EEEE;
  --sage:#A8B5A0; --sage-l:#D4DDD0; --sage-p:#EDF0EB;
  --lav:#B8ADCF;  --lav-l:#DDD8EE;  --lav-p:#F2F0F8;
  --mist:#C4C9D4; --mist-l:#E8EBF0;
  --amber:#C9A96E; --amber-p:#F8F1E6;
  --cream:#FAF8F5; --ink:#2D2926; --soft:#5C5450; --muted:#9B9490; --white:#fff;
}
html,body { height:100%; font-family:"DM Sans",sans-serif; background:var(--cream); color:var(--ink); }
.app { min-height:100vh; display:flex; flex-direction:column; }

/* HEADER */
header { background:var(--white); border-bottom:1px solid var(--rose-l); padding:18px 24px 0; }
.header-top { display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; }
.logo { font-family:"Cormorant Garamond",serif; font-size:21px; font-weight:400; letter-spacing:.04em; }
.logo em { color:var(--rose); font-style:italic; }
.header-right { display:flex; align-items:center; gap:10px; }
.progress-pill { font-size:11px; font-weight:500; letter-spacing:.07em; text-transform:uppercase; color:var(--rose); background:var(--rose-p); padding:4px 11px; border-radius:20px; }
.bags-btn { display:flex; align-items:center; gap:5px; font-size:12px; color:var(--muted); background:none; border:1.5px solid var(--mist-l); border-radius:20px; padding:4px 10px; cursor:pointer; font-family:"DM Sans",sans-serif; transition:all .18s; }
.bags-btn:hover { border-color:var(--amber); color:var(--amber); }
.bags-count { font-weight:600; color:var(--amber); }

/* FILTER BAR — single compact row */
.filter-bar { display:flex; gap:6px; flex-wrap:wrap; padding:12px 0 14px; overflow-x:auto; -webkit-overflow-scrolling:touch; scrollbar-width:none; }
.filter-bar::-webkit-scrollbar { display:none; }
.fb-divider { width:1px; background:var(--mist-l); flex-shrink:0; margin:2px 2px; }
.fb-btn {
  padding:6px 12px; border-radius:20px; border:1.5px solid var(--mist-l); background:var(--white);
  font-family:"DM Sans",sans-serif; font-size:12px; color:var(--soft); cursor:pointer;
  transition:all .18s; white-space:nowrap; flex-shrink:0;
}
.fb-btn.active { border-color:var(--rose); background:var(--rose-p); color:var(--ink); font-weight:500; }
.fb-btn.time-active { border-color:var(--lav); background:var(--lav-p); color:var(--ink); font-weight:500; }

/* PROGRESS BAR */
.prog-track { height:2px; background:var(--mist-l); }
.prog-fill { height:100%; background:linear-gradient(90deg,var(--rose),var(--lav)); transition:width .6s ease; }

/* MAIN */
main { flex:1; overflow-y:auto; padding:20px 24px; max-width:760px; margin:0 auto; width:100%; }
.slabel { font-size:10px; letter-spacing:.12em; text-transform:uppercase; color:var(--muted); margin-bottom:12px; font-weight:500; }

/* TASK GRID */
.task-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:10px; }

.tcard {
  background:var(--white); border-radius:16px; padding:16px; cursor:pointer;
  border:1.5px solid transparent; transition:all .18s; position:relative; overflow:hidden;
  display:flex; flex-direction:column;
}
.tcard:hover { border-color:var(--rose-l); box-shadow:0 4px 18px rgba(45,41,38,.07); transform:translateY(-2px); }
.tcard.done-card { opacity:.5; }
.tcard.done-card::after {
  content:"done"; position:absolute; top:10px; right:10px; font-size:10px; letter-spacing:.08em;
  text-transform:uppercase; color:var(--sage); font-weight:500; background:var(--sage-p);
  padding:2px 7px; border-radius:10px;
}

/* card effort badge */
.tcard-effort {
  display:inline-flex; align-items:center; gap:4px;
  font-size:10px; font-weight:500; letter-spacing:.05em; text-transform:uppercase;
  padding:3px 8px; border-radius:10px; margin-bottom:10px; width:fit-content;
}
.effort-quick  { background:#EDF0EB; color:#7A9E73; }
.effort-focus  { background:#F2F0F8; color:#9089BA; }
.effort-deep   { background:#F8F1E6; color:#B08A50; }

.tcard-icon { font-size:20px; margin-bottom:6px; }
.tcard-room { font-size:10px; color:var(--muted); letter-spacing:.07em; text-transform:uppercase; margin-bottom:4px; }
.tcard-title { font-family:"Cormorant Garamond",serif; font-size:16px; line-height:1.3; color:var(--ink); flex:1; margin-bottom:10px; }
.tcard-hint { font-size:11px; color:var(--muted); line-height:1.4; margin-bottom:10px; font-style:italic; }
.tcard-bottom { display:flex; align-items:center; justify-content:space-between; margin-top:auto; }
.tcard-time { font-size:11px; color:var(--muted); }
.tcard-time.edited { color:var(--lav); }

/* section toggles */
.section-toggle { display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; cursor:pointer; }
.section-toggle .slabel { margin-bottom:0; }
.section-toggle-icon { font-size:12px; color:var(--muted); transition:transform .2s; }
.section-toggle-icon.open { transform:rotate(180deg); }

/* done section */
.done-section { margin-top:28px; }

.no-tasks { text-align:center; padding:40px 20px; color:var(--muted); font-size:14px; line-height:1.8; }
.no-tasks .nt-icon { font-size:36px; margin-bottom:10px; }
.no-tasks .nt-sub { font-size:12px; margin-top:8px; }

/* ALL DONE banner */
.all-done-banner {
  background:var(--sage-p); border:1.5px solid var(--sage-l); border-radius:18px;
  padding:32px 24px; text-align:center;
}
.all-done-banner .adb-emoji { font-size:44px; margin-bottom:12px; }
.all-done-banner .adb-title { font-family:"Cormorant Garamond",serif; font-size:26px; margin-bottom:8px; }
.all-done-banner .adb-sub { font-size:13px; color:var(--soft); line-height:1.7; }

/* SHEET */
.detail-overlay {
  position:fixed; inset:0; background:rgba(45,41,38,.32); backdrop-filter:blur(4px);
  z-index:50; display:flex; align-items:flex-end; justify-content:center;
  opacity:0; pointer-events:none; transition:opacity .22s;
}
.detail-overlay.open { opacity:1; pointer-events:all; }
.detail-sheet {
  background:var(--white); border-radius:24px 24px 0 0; padding:24px 24px 32px;
  width:100%; max-width:760px; max-height:90vh; overflow-y:auto;
  transform:translateY(32px); transition:transform .28s ease;
}
.detail-overlay.open .detail-sheet { transform:translateY(0); }
.sheet-handle { width:36px; height:4px; background:var(--mist-l); border-radius:4px; margin:0 auto 18px; }

/* sheet header */
.sheet-header { display:flex; align-items:flex-start; justify-content:space-between; gap:12px; margin-bottom:6px; }
.sheet-header-left { flex:1; }
.sheet-room-row { display:flex; align-items:center; gap:6px; font-size:11px; color:var(--muted); letter-spacing:.07em; text-transform:uppercase; margin-bottom:8px; }
.sheet-title { font-family:"Cormorant Garamond",serif; font-size:24px; line-height:1.25; }

/* time editor — prominent */
.time-editor {
  display:flex; flex-direction:column; align-items:center; gap:4px; flex-shrink:0;
  background:var(--lav-p); border:1.5px solid var(--lav-l); border-radius:14px; padding:10px 12px;
  min-width:72px;
}
.time-editor-label { font-size:9px; letter-spacing:.09em; text-transform:uppercase; color:var(--lav); font-weight:500; }
.time-editor-val { font-size:18px; font-weight:500; color:var(--ink); line-height:1; }
.time-editor-unit { font-size:10px; color:var(--muted); }
.time-editor-btns { display:flex; gap:6px; margin-top:2px; }
.time-editor-btns button {
  width:24px; height:24px; border-radius:50%; border:1.5px solid var(--lav-l);
  background:var(--white); font-size:14px; color:var(--lav); cursor:pointer;
  display:flex; align-items:center; justify-content:center; transition:all .15s;
  font-family:"DM Sans",sans-serif; line-height:1;
}
.time-editor-btns button:hover { background:var(--lav-p); border-color:var(--lav); }

.sheet-desc { font-size:13px; color:var(--soft); line-height:1.75; margin:14px 0 18px; }

/* keep box */
.keep-box { background:var(--lav-p); border:1.5px solid var(--lav-l); border-radius:14px; padding:14px 16px; margin-bottom:18px; }
.keep-box-label { font-size:10px; letter-spacing:.1em; text-transform:uppercase; color:var(--lav); font-weight:500; margin-bottom:8px; }
.keep-items { display:flex; flex-direction:column; gap:6px; }
.keep-item { font-size:13px; color:var(--soft); line-height:1.5; display:flex; gap:8px; }
.keep-item::before { content:"✦"; color:var(--lav); font-size:9px; margin-top:4px; flex-shrink:0; }

/* hesitation tip */
.hesitation-tip {
  background:var(--amber-p); border-left:3px solid var(--amber); border-radius:0 10px 10px 0;
  padding:10px 14px; margin-bottom:18px; font-size:12px; color:var(--soft); line-height:1.6;
}
.hesitation-tip strong { color:var(--amber); display:block; font-size:10px; letter-spacing:.08em; text-transform:uppercase; margin-bottom:3px; }

/* steps */
.sheet-steps-label { font-size:10px; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); margin-bottom:8px; font-weight:500; }
.sheet-steps { list-style:none; margin-bottom:20px; }
.sheet-steps li {
  display:flex; align-items:flex-start; gap:12px; padding:10px 0;
  border-bottom:1px solid var(--rose-p); font-size:13px; color:var(--soft);
  line-height:1.55; cursor:pointer; transition:color .15s;
}
.sheet-steps li:last-child { border-bottom:none; }
.sheet-steps li.sdone { color:var(--muted); text-decoration:line-through; }
.scheck {
  width:20px; height:20px; border-radius:50%; border:1.5px solid var(--rose-l);
  display:flex; align-items:center; justify-content:center; flex-shrink:0; margin-top:1px;
  font-size:10px; transition:all .18s;
}
.sheet-steps li.sdone .scheck { background:var(--sage); border-color:var(--sage); color:var(--white); }

/* action buttons */
.btn-complete {
  width:100%; padding:14px; border:none; border-radius:14px; cursor:pointer;
  font-family:"DM Sans",sans-serif; font-size:14px; font-weight:500; letter-spacing:.03em;
  background:linear-gradient(135deg,var(--rose),var(--lav)); color:var(--white); transition:opacity .2s,transform .1s;
  margin-bottom:8px;
}
.btn-complete:hover { opacity:.9; transform:translateY(-1px); }
.btn-complete:active { transform:translateY(0); }
.btn-anyway {
  width:100%; padding:11px; border:1.5px solid var(--mist-l); border-radius:12px;
  background:transparent; font-family:"DM Sans",sans-serif; font-size:12px; color:var(--muted); cursor:pointer;
  margin-bottom:8px; transition:all .15s;
}
.btn-anyway:hover { border-color:var(--sage-l); color:var(--sage); }
.btn-close {
  width:100%; padding:11px; border:1.5px solid var(--mist-l); border-radius:12px;
  background:transparent; font-family:"DM Sans",sans-serif; font-size:12px; color:var(--muted); cursor:pointer;
}

/* bags modal */
.bags-overlay {
  position:fixed; inset:0; background:rgba(45,41,38,.35); backdrop-filter:blur(4px);
  z-index:60; display:flex; align-items:center; justify-content:center;
  opacity:0; pointer-events:none; transition:opacity .22s;
}
.bags-overlay.open { opacity:1; pointer-events:all; }
.bags-card {
  background:var(--white); border-radius:24px; padding:32px 28px; width:90%; max-width:340px;
  text-align:center; box-shadow:0 8px 40px rgba(45,41,38,.12);
  animation:floatIn .3s ease;
}
.bags-emoji { font-size:44px; margin-bottom:12px; }
.bags-title { font-family:"Cormorant Garamond",serif; font-size:22px; margin-bottom:6px; }
.bags-sub { font-size:13px; color:var(--muted); margin-bottom:20px; line-height:1.6; }
.bags-counter { display:flex; align-items:center; justify-content:center; gap:16px; margin-bottom:20px; }
.bags-counter button {
  width:40px; height:40px; border-radius:50%; border:1.5px solid var(--mist-l); background:var(--white);
  font-size:20px; cursor:pointer; color:var(--soft); display:flex; align-items:center; justify-content:center;
  font-family:"DM Sans",sans-serif; transition:all .15s;
}
.bags-counter button:hover { border-color:var(--amber); color:var(--amber); }
.bags-num { font-family:"Cormorant Garamond",serif; font-size:48px; color:var(--amber); line-height:1; min-width:60px; }
.bags-unit { font-size:12px; color:var(--muted); margin-top:4px; }
.btn-bags-close { padding:11px 28px; background:var(--ink); color:var(--white); border:none; border-radius:12px; font-family:"DM Sans",sans-serif; font-size:13px; cursor:pointer; }

/* celebration */
.cel-overlay {
  position:fixed; inset:0; background:rgba(250,248,245,.9); backdrop-filter:blur(8px);
  z-index:100; display:flex; align-items:center; justify-content:center;
  opacity:0; pointer-events:none; transition:opacity .28s;
}
.cel-overlay.show { opacity:1; pointer-events:all; }
.cel-card {
  background:var(--white); border-radius:24px; padding:44px 32px; text-align:center;
  box-shadow:0 8px 40px rgba(45,41,38,.12); max-width:320px; width:90%;
  animation:floatIn .35s ease;
}
@keyframes floatIn { from{transform:translateY(18px);opacity:0} to{transform:translateY(0);opacity:1} }
.cel-emoji { font-size:48px; margin-bottom:12px; }
.cel-title { font-family:"Cormorant Garamond",serif; font-size:24px; margin-bottom:6px; }
.cel-sub { font-size:13px; color:var(--muted); margin-bottom:22px; line-height:1.65; }
.btn-cel { padding:12px 28px; background:linear-gradient(135deg,var(--rose),var(--lav)); color:var(--white); border:none; border-radius:12px; font-family:"DM Sans",sans-serif; font-size:13px; font-weight:500; cursor:pointer; }

/* NAV — merged into single toggle */
nav {
  background:var(--white); border-top:1px solid var(--rose-l);
  padding:10px 24px 18px; display:flex; justify-content:center;
}
.nav-toggle { display:flex; background:var(--cream); border-radius:14px; padding:3px; gap:2px; }
.nav-btn {
  padding:8px 20px; border-radius:11px; border:none; background:transparent;
  font-family:"DM Sans",sans-serif; font-size:12px; color:var(--muted); cursor:pointer; transition:all .18s;
  letter-spacing:.03em;
}
.nav-btn.active { background:var(--white); color:var(--ink); font-weight:500; box-shadow:0 1px 4px rgba(45,41,38,.08); }

.view { display:none; }
.view.active { display:block; }

/* rooms view embedded as section */
.rooms-list { display:flex; flex-direction:column; gap:8px; }
.rcard {
  background:var(--white); border-radius:14px; padding:14px 18px;
  display:flex; align-items:center; gap:14px; cursor:pointer; transition:all .18s;
}
.rcard:hover { box-shadow:0 3px 14px rgba(45,41,38,.07); transform:translateX(2px); }
.rcard-icon { font-size:22px; flex-shrink:0; }
.rcard-info { flex:1; }
.rcard-name { font-family:"Cormorant Garamond",serif; font-size:17px; margin-bottom:1px; }
.rcard-sub { font-size:11px; color:var(--muted); }
.rcard-ring { position:relative; width:40px; height:40px; flex-shrink:0; }
.rcard-ring svg { transform:rotate(-90deg); }
.rcard-pct { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); font-size:10px; font-weight:500; color:var(--soft); }

@media(max-width:480px){
  main { padding:16px 16px; }
  .task-grid { grid-template-columns:1fr 1fr; }
  .tcard { padding:12px; }
  header { padding:16px 16px 0; }
}
</style>
</head>
<body>
<div class="app">

<header>
  <div class="header-top">
    <div class="logo">clear <em>home</em></div>
    <div class="header-right">
      <button class="bags-btn" onclick="openBags()">
        <span>&#x1F6CD;</span> <span class="bags-count" id="bagsCount">0</span> bags out
      </button>
      <div class="progress-pill" id="progPill">0 / 35</div>
    </div>
  </div>
  <div class="filter-bar" id="filterBar"></div>
  <div class="prog-track"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
</header>

<main>
  <div class="view active" id="viewPick">
    <div class="slabel" id="resultsLabel" style="margin-bottom:14px">All tasks</div>
    <div class="task-grid" id="taskGrid"></div>
    <div class="done-section" id="doneSection" style="display:none">
      <div class="section-toggle" onclick="toggleDone()">
        <div class="slabel">Completed</div>
        <span class="section-toggle-icon" id="doneToggleIcon">&#x25BC;</span>
      </div>
      <div id="doneGrid" class="task-grid"></div>
    </div>
  </div>

  <div class="view" id="viewRooms">
    <div class="slabel">Progress by room</div>
    <div class="rooms-list" id="roomsList"></div>
  </div>
</main>

<!-- Task sheet -->
<div class="detail-overlay" id="detailOverlay" onclick="maybeCloseDetail(event)">
  <div class="detail-sheet">
    <div class="sheet-handle"></div>
    <div id="sheetContent"></div>
  </div>
</div>

<!-- Bags modal -->
<div class="bags-overlay" id="bagsOverlay" onclick="maybeCloseBags(event)">
  <div class="bags-card" id="bagsCard">
    <div class="bags-emoji">&#x1F6CD;</div>
    <div class="bags-title">Bags out the door</div>
    <div class="bags-sub">Every bag is a decision made permanent. Track them here.</div>
    <div class="bags-counter">
      <button onclick="addBags(-1)">&#8722;</button>
      <div><div class="bags-num" id="bagsNum">0</div><div class="bags-unit">bags / boxes</div></div>
      <button onclick="addBags(1)">&#43;</button>
    </div>
    <button class="btn-bags-close" onclick="closeBags()">Done</button>
  </div>
</div>

<!-- Celebration -->
<div class="cel-overlay" id="celOverlay">
  <div class="cel-card">
    <div class="cel-emoji" id="celEmoji">&#x1F33F;</div>
    <div class="cel-title" id="celTitle">Done!</div>
    <div class="cel-sub" id="celSub">One area lighter.</div>
    <button class="btn-cel" onclick="closeCel()">Continue</button>
  </div>
</div>

<nav>
  <div class="nav-toggle">
    <button class="nav-btn active" data-view="viewPick" onclick="switchView(this)">Tasks</button>
    <button class="nav-btn" data-view="viewRooms" onclick="switchView(this)">Rooms</button>
  </div>
</nav>
</div>

<script>
var ROOMS = [
  {id:"bedroom",   name:"Bedroom",          icon:"&#x1F6CF;&#xFE0F;", color:"#E8D5D5",stroke:"#C8A4A4"},
  {id:"wardrobe",  name:"Walking Wardrobe", icon:"&#x1F457;",          color:"#DDD8EE",stroke:"#B8ADCF"},
  {id:"bathroom",  name:"Main Bathroom",    icon:"&#x1F6C1;",          color:"#D4DDD0",stroke:"#A8B5A0"},
  {id:"kids_room", name:"Kids Room",        icon:"&#x1F319;",          color:"#E8D5D5",stroke:"#C8A4A4"},
  {id:"kitchen",   name:"Kitchen",          icon:"&#x1F373;",          color:"#D4DDD0",stroke:"#A8B5A0"},
  {id:"pantry",    name:"Pantry",           icon:"&#x1FAD9;",          color:"#DDD8EE",stroke:"#B8ADCF"},
  {id:"office",    name:"Office",           icon:"&#x1F4DA;",          color:"#E4E7EE",stroke:"#C4C9D4"},
  {id:"living",    name:"Living Room",      icon:"&#x1F6CB;&#xFE0F;",  color:"#EDD8D8",stroke:"#C8A4A4"},
  {id:"kids_play", name:"Kids Playroom",    icon:"&#x1F9F8;",          color:"#D8EEDD",stroke:"#A8B5A0"},
  {id:"dining",    name:"Dining Room",      icon:"&#x1F3B2;",          color:"#DDE8ED",stroke:"#A8B5A0"},
];

var TASKS = [
  {room:"bedroom",title:"Bedside table drawers",time:10,energy:"quick",
   hint:"Tiny space, quick decisions.",
   tip:"If you put something in a drawer and forgot it was there — it leaves.",
   desc:"Two bedside tables hold multitudes. Time to see what is actually living there.",
   keep:["1 book you are currently reading","1 hand cream or lip balm","1 charging cable, coiled neatly","Max 2 other items you use every single night"],
   steps:["Empty both drawers completely onto the bed","Handle every item: does it belong on a bedside table?","Toss old receipts, dried pens, forgotten chargers, anything that puzzles you","Wipe inside drawers with a damp cloth","Collect homeless items in a basket to rehome later"]},

  {room:"bedroom",title:"Bedroom shelf clear-out",time:20,energy:"focus",

   tip:"If you are hesitating on an object, that hesitation is the answer.",

   steps:["Clear the entire shelf onto the bed or floor","For each object: is it beautiful or useful? Does it belong in a bedroom?","Remove anything that landed here by accident and find it a real home","Dust before returning only the chosen few","Step back: does it feel calm? Remove one more thing if not"]},

  {room:"bedroom",title:"Bedding audit",time:30,energy:"deep",

   steps:["Pull all bedding from wardrobe or storage","Count complete sets: duvet cover, sheet, pillowcases together","Check condition: pilling, stains, worn elastic — it goes","Fold neatly — store each set inside its own pillowcase","Bag anything leaving the house now, not later"]},

  {room:"wardrobe",title:"Tops — the maybe-pile method",time:30,energy:"deep",

// ── STATE ─────────────────────────────────────────────────────────────────────
var KEY = "clearHome_v3";
function loadState() {
  try { var r = localStorage.getItem(KEY); if (r) return JSON.parse(r); } catch(e){}
  return {done:{}, steps:{}, customTime:{}, bags:0};
}
function save() { localStorage.setItem(KEY, JSON.stringify(state)); }
var state = loadState();

var filterTime = 999;
var filterRoom = "all";
var doneOpen = false;
var activeTaskIdx = null;

// ── INIT ─────────────────────────────────────────────────────────────────────
buildFilterBar();
renderGrid();
updateHeader();

function getTime(idx) {
  return (state.customTime && state.customTime[idx] != null) ? state.customTime[idx] : TASKS[idx].time;
}

function effortLabel(e) {
  if (e === "quick") return {cls:"effort-quick", txt:"Quick win"};
  if (e === "focus") return {cls:"effort-focus", txt:"Focused"};
  return {cls:"effort-deep", txt:"Deep dive"};
}

// ── FILTER BAR ────────────────────────────────────────────────────────────────
function buildFilterBar() {
  var bar = document.getElementById("filterBar");
  var timeOptions = [
    {max:10, label:"10 min"},
    {max:15, label:"15 min"},
    {max:20, label:"20 min"},
    {max:30, label:"30 min"},
    {max:999, label:"Any time"},
  ];
  var html = "";
  timeOptions.forEach(function(o) {
    var active = o.max === 999 ? "time-active" : "";
    html += '<button class="fb-btn ' + active + '" data-max="' + o.max + '" data-type="time" onclick="setTimeFilter(this)">' + o.label + '</button>';
  });
  html += '<div class="fb-divider"></div>';
  html += '<button class="fb-btn active" data-room="all" data-type="room" onclick="setRoomFilter(this)">All rooms</button>';
  ROOMS.forEach(function(r) {
    html += '<button class="fb-btn" data-room="' + r.id + '" data-type="room" onclick="setRoomFilter(this)">' + r.icon + ' ' + r.name + '</button>';
  });
  bar.innerHTML = html;
  // set Any time active
  var timeBtns = bar.querySelectorAll('[data-type="time"]');
  timeBtns[timeBtns.length-1].classList.add("time-active");
}

function setTimeFilter(btn) {
  document.querySelectorAll('[data-type="time"]').forEach(function(b){b.classList.remove("time-active");});
  btn.classList.add("time-active");
  filterTime = parseInt(btn.dataset.max);
  renderGrid();
}

function setRoomFilter(btn) {
  document.querySelectorAll('[data-type="room"]').forEach(function(b){b.classList.remove("active");});
  btn.classList.add("active");
  filterRoom = btn.dataset.room;
  renderGrid();
}

// ── GRID ─────────────────────────────────────────────────────────────────────
function renderGrid() {
  var grid = document.getElementById("taskGrid");
  var doneGrid = document.getElementById("doneGrid");
  var doneSection = document.getElementById("doneSection");
  var label = document.getElementById("resultsLabel");

  var remaining = [];
  var doneItems = [];

  for (var i = 0; i < TASKS.length; i++) {
    var t = TASKS[i];
    var effectiveTime = getTime(i);
    var roomOk = filterRoom === "all" || t.room === filterRoom;
    var timeOk = effectiveTime <= filterTime;
    if (!roomOk || !timeOk) continue;
    if (state.done[i]) doneItems.push({t:t,i:i});
    else remaining.push({t:t,i:i});
  }

  // label
  var totalFiltered = remaining.length + doneItems.length;
  if (filterTime < 999) {
    label.textContent = remaining.length + " task" + (remaining.length !== 1 ? "s" : "") + " within " + filterTime + " min";
  } else if (filterRoom !== "all") {
    label.textContent = remaining.length + " remaining in this room";
  } else {
    label.textContent = remaining.length + " remaining";
  }

  // all done in current filter
  if (totalFiltered > 0 && remaining.length === 0) {
    var roomName = filterRoom === "all" ? "everything in this view" : ROOMS.find(function(r){return r.id===filterRoom;}).name;
    grid.innerHTML = '<div class="all-done-banner" style="grid-column:1/-1">' +
      '<div class="adb-emoji">&#x1F33F;</div>' +
      '<div class="adb-title">All clear!</div>' +
      '<div class="adb-sub">You have completed ' + roomName + '.<br>Choose a different filter to find more tasks, or enjoy the calm.</div>' +
      '</div>';
  } else if (totalFiltered === 0) {
    grid.innerHTML = '<div class="no-tasks" style="grid-column:1/-1"><div class="nt-icon">&#x1F50D;</div>No tasks match this filter.<div class="nt-sub">Try a longer time or a different room.</div></div>';
  } else {
    grid.innerHTML = remaining.map(function(item){return cardHtml(item, false);}).join("");
  }

  // done section
  if (doneItems.length > 0) {
    doneSection.style.display = "block";
    document.getElementById("doneSection").querySelector(".slabel").textContent = doneItems.length + " completed";
    if (doneOpen) {
      doneGrid.innerHTML = doneItems.map(function(item){return cardHtml(item, true);}).join("");
    } else {
      doneGrid.innerHTML = "";
    }
  } else {
    doneSection.style.display = "none";
  }
}

function cardHtml(item, isDone) {
  var t = item.t; var idx = item.i;
  var ri = ROOMS.find(function(r){return r.id === t.room;}) || ROOMS[0];
  var displayTime = getTime(idx);
  var timeEdited = state.customTime && state.customTime[idx] != null && state.customTime[idx] !== t.time;
  var eff = effortLabel(t.energy);
  var stepsDone = (state.steps[idx] || []).length;
  var totalSteps = t.steps.length;
  var hasProgress = stepsDone > 0 && !isDone;

  return '<div class="tcard' + (isDone ? " done-card" : "") + '" onclick="openTask(' + idx + ')">' +
    '<div class="tcard-effort ' + eff.cls + '">' + eff.txt + '</div>' +
    '<div class="tcard-icon">' + ri.icon + '</div>' +
    '<div class="tcard-room">' + ri.name + '</div>' +
    '<div class="tcard-title">' + t.title + '</div>' +
    (hasProgress ? '<div class="tcard-hint">&#x25CF; ' + stepsDone + '/' + totalSteps + ' steps done</div>' : '') +
    '<div class="tcard-bottom">' +
    '<span class="tcard-time' + (timeEdited ? " edited" : "") + '">&#x23F1; ' + displayTime + ' min</span>' +
    '<span style="font-size:11px;color:var(--lav)">&#x2736; ' + t.keep.length + ' rules</span>' +
    '</div></div>';
}

function toggleDone() {
  doneOpen = !doneOpen;
  document.getElementById("doneToggleIcon").classList.toggle("open", doneOpen);
  renderGrid();
}

// ── HEADER ────────────────────────────────────────────────────────────────────
function updateHeader() {
  var total = TASKS.length;
  var doneCount = Object.keys(state.done).length;
  var pct = Math.round((doneCount / total) * 100);
  document.getElementById("progPill").textContent = doneCount + " / " + total;
  document.getElementById("progFill").style.width = pct + "%";
  document.getElementById("bagsCount").textContent = state.bags || 0;
  document.getElementById("bagsNum").textContent = state.bags || 0;
}

// ── TASK SHEET ────────────────────────────────────────────────────────────────
function openTask(idx) {
  activeTaskIdx = idx;
  renderSheet(idx);
  document.getElementById("detailOverlay").classList.add("open");
  document.body.style.overflow = "hidden";
}

function renderSheet(idx) {
  var t = TASKS[idx];
  var ri = ROOMS.find(function(r){return r.id === t.room;}) || ROOMS[0];
  var stepsDone = state.steps[idx] || [];
  var allStepsDone = stepsDone.length >= t.steps.length;
  var isDone = !!state.done[idx];
  var customTime = getTime(idx);
  var eff = effortLabel(t.energy);

  var keepHtml = t.keep.map(function(k){
    return '<div class="keep-item">' + k + '</div>';
  }).join("");

  var stepsHtml = t.steps.map(function(s,i){
    var done = stepsDone.indexOf(i) > -1;
    return '<li class="' + (done ? "sdone" : "") + '" onclick="toggleStep(' + idx + ',' + i + ')">' +
      '<div class="scheck">' + (done ? "&#x2713;" : "") + '</div><span>' + s + '</span></li>';
  }).join("");

  var actionHtml;
  if (isDone) {
    actionHtml = '<div style="background:var(--sage-p);border:1.5px solid var(--sage-l);border-radius:14px;padding:14px 18px;text-align:center;font-size:13px;color:var(--sage);margin-bottom:8px;">&#x2713; Completed</div>';
  } else if (allStepsDone) {
    actionHtml = '<button class="btn-complete" onclick="markDone(' + idx + ')">Mark as complete &#x2713;</button>';
  } else {
    var doneCount = stepsDone.length;
    var partialNote = doneCount > 0
      ? '<button class="btn-anyway" onclick="markDone(' + idx + ')">Mark complete anyway (' + doneCount + '/' + t.steps.length + ' steps done)</button>'
      : '';
    actionHtml = '<button class="btn-complete" disabled>Tick steps above to complete</button>' + partialNote;
  }

  document.getElementById("sheetContent").innerHTML =
    '<div class="sheet-header">' +
      '<div class="sheet-header-left">' +
        '<div class="sheet-room-row">' +
          '<span>' + ri.icon + '</span>' +
          '<span>' + ri.name + '</span>' +
          '<span style="background:' + (t.energy==="quick"?"#EDF0EB":t.energy==="focus"?"#F2F0F8":"#F8F1E6") + ';color:' + (t.energy==="quick"?"#7A9E73":t.energy==="focus"?"#9089BA":"#B08A50") + ';padding:2px 8px;border-radius:8px;font-size:10px;font-weight:500">' + eff.txt + '</span>' +
        '</div>' +
        '<div class="sheet-title">' + t.title + '</div>' +
      '</div>' +
      '<div class="time-editor">' +
        '<div class="time-editor-label">Your time</div>' +
        '<div class="time-editor-val">' + customTime + '</div>' +
        '<div class="time-editor-unit">minutes</div>' +
        '<div class="time-editor-btns">' +
          '<button onclick="adjustTime(' + idx + ',-5)">&#8722;</button>' +
          '<button onclick="adjustTime(' + idx + ',5)">&#43;</button>' +
        '</div>' +
      '</div>' +
    '</div>' +
    '<div class="sheet-desc">' + t.desc + '</div>' +
    '<div class="keep-box"><div class="keep-box-label">How much to keep</div><div class="keep-items">' + keepHtml + '</div></div>' +
    '<div class="hesitation-tip"><strong>If you are hesitating</strong>' + t.tip + '</div>' +
    '<div class="sheet-steps-label">Steps</div><ul class="sheet-steps">' + stepsHtml + '</ul>' +
    actionHtml +
    '<button class="btn-close" onclick="closeDetail()">Close</button>';
}

function toggleStep(taskIdx, stepIdx) {
  if (!state.steps[taskIdx]) state.steps[taskIdx] = [];
  var arr = state.steps[taskIdx];
  var pos = arr.indexOf(stepIdx);
  if (pos > -1) arr.splice(pos,1); else arr.push(stepIdx);
  save();
  renderSheet(taskIdx);
}

function adjustTime(idx, delta) {
  if (!state.customTime) state.customTime = {};
  var current = getTime(idx);
  state.customTime[idx] = Math.max(5, current + delta);
  save();
  renderSheet(idx);
  renderGrid();
}

function markDone(idx) {
  state.done[idx] = new Date().toISOString();
  delete state.steps[idx];
  save();
  closeDetail();
  updateHeader();
  renderGrid();
  showCel();
}

function closeDetail() {
  document.getElementById("detailOverlay").classList.remove("open");
  document.body.style.overflow = "";
  activeTaskIdx = null;
}

function maybeCloseDetail(e) {
  if (e.target === document.getElementById("detailOverlay")) closeDetail();
}

// ── BAGS ─────────────────────────────────────────────────────────────────────
function openBags() {
  document.getElementById("bagsNum").textContent = state.bags || 0;
  document.getElementById("bagsOverlay").classList.add("open");
  document.body.style.overflow = "hidden";
}
function closeBags() {
  document.getElementById("bagsOverlay").classList.remove("open");
  document.body.style.overflow = "";
}
function maybeCloseBags(e) {
  if (e.target === document.getElementById("bagsOverlay")) closeBags();
}
function addBags(delta) {
  state.bags = Math.max(0, (state.bags || 0) + delta);
  save();
  document.getElementById("bagsNum").textContent = state.bags;
  document.getElementById("bagsCount").textContent = state.bags;
}

// ── CELEBRATION ───────────────────────────────────────────────────────────────
var MSGS = [
  {e:"&#x1F33F;",t:"Beautifully done.",s:"One area lighter. Your home breathes a little easier."},
  {e:"&#x2728;",t:"That is progress.",s:"Small steps, consistently — that is how a home transforms."},
  {e:"&#x1F54A;&#xFE0F;",t:"Space cleared.",s:"What you let go of creates room for what matters most."},
  {e:"&#x1F338;",t:"Wonderful!",s:"Your home is becoming calmer with every session."},
  {e:"&#x1FAF6;",t:"Done with care.",s:"This is an act of love for your home and your family."},
  {e:"&#x1F343;",t:"Lighter.",s:"Every bag out the door is a decision made permanent."},
];
function showCel() {
  var m = MSGS[Math.floor(Math.random()*MSGS.length)];
  document.getElementById("celEmoji").innerHTML = m.e;
  document.getElementById("celTitle").textContent = m.t;
  document.getElementById("celSub").textContent = m.s;
  document.getElementById("celOverlay").classList.add("show");
}
function closeCel() { document.getElementById("celOverlay").classList.remove("show"); }

// ── ROOMS VIEW ────────────────────────────────────────────────────────────────
function renderRooms() {
  var list = document.getElementById("roomsList");
  list.innerHTML = ROOMS.map(function(room) {
    var indices = [];
    for (var i=0; i<TASKS.length; i++) { if (TASKS[i].room === room.id) indices.push(i); }
    var doneCount = indices.filter(function(i){return !!state.done[i];}).length;
    var total = indices.length;
    var pct = total ? Math.round((doneCount/total)*100) : 0;
    var R=16, circ=2*Math.PI*R, dash=(pct/100)*circ;
    var allDone = doneCount === total;
    return '<div class="rcard" onclick="jumpToRoom(\'' + room.id + '\')" style="' + (allDone?"opacity:.6":"") + '">' +
      '<div class="rcard-icon">' + room.icon + '</div>' +
      '<div class="rcard-info">' +
        '<div class="rcard-name">' + room.name + '</div>' +
        '<div class="rcard-sub">' + doneCount + ' of ' + total + ' tasks done' + (allDone ? ' &#x2713;' : '') + '</div>' +
      '</div>' +
      '<div class="rcard-ring"><svg width="40" height="40" viewBox="0 0 40 40">' +
        '<circle cx="20" cy="20" r="' + R + '" fill="none" stroke="' + room.color + '" stroke-width="4"/>' +
        '<circle cx="20" cy="20" r="' + R + '" fill="none" stroke="' + room.stroke + '" stroke-width="4" stroke-dasharray="' + dash.toFixed(1) + ' ' + circ.toFixed(1) + '" stroke-linecap="round"/>' +
      '</svg><div class="rcard-pct">' + pct + '%</div></div></div>';
  }).join("");
}

function jumpToRoom(roomId) {
  document.querySelectorAll(".view").forEach(function(v){v.classList.toggle("active",v.id==="viewPick");});
  document.querySelectorAll(".nav-btn").forEach(function(b){b.classList.toggle("active",b.dataset.view==="viewPick");});
  filterRoom = roomId;
  document.querySelectorAll('[data-type="room"]').forEach(function(b){b.classList.toggle("active",b.dataset.room===roomId);});
  renderGrid();
  window.scrollTo({top:0,behavior:"smooth"});
}

// ── NAV ───────────────────────────────────────────────────────────────────────
function switchView(btn) {
  var viewId = btn.dataset.view;
  document.querySelectorAll(".view").forEach(function(v){v.classList.toggle("active",v.id===viewId);});
  document.querySelectorAll(".nav-btn").forEach(function(b){b.classList.toggle("active",b===btn);});
  if (viewId === "viewRooms") renderRooms();
}
</script>
</body>
</html>
